<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Administrador / Técnico </title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-container">
    <img class="login-logo" src="logo/logo.png" alt="Logo Kollab Koncepts">
    <h1>Iniciar Sesión (Administrador / Técnico)</h1>
    <form onsubmit="window.location='admin.html'; return false;">
        <label>Usuario / Email:</label>
        <input type="text" required>
        <label>Contraseña:</label>
        <input type="password" required>
        <button type="submit" style="width:100%;margin-top:.5em;">Ingresar</button>
    </form>
    <a href="login-cliente.html">Ingresar como Cliente</a>
</div>
</body>
</html>

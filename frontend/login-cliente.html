<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Cliente</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-container">
    <img class="login-logo" src="logo/logo.png" alt="Logo Kollab Koncepts">
    <h1>Iniciar Sesión (Cliente)</h1>
    <form onsubmit="window.location='dashboard.html'; return false;">
        <label>Email:</label>
        <input type="email" required>
        <label>Contraseña:</label>
        <input type="password" required>
        <button type="submit" style="width:100%;margin-top:.5em;">Ingresar</button>
    </form>
    <a href="login-admin.html">Ingresar como Administrador</a>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de Tickets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <img class="login-logo" src="logo/logo.png" alt="Logo Kollab Koncepts">
        <h1>Portal de Tickets</h1>

        <div>
            <h2>Acceso Cliente</h2>
            <form onsubmit="window.location='cliente-tickets.html'; return false;">
                <label>Correo registrado:</label>
                <input type="email" required>

                <label>ID de Cliente:</label>
                <input type="text" required>

                <button type="submit" style="width:100%;margin-top:.5em;">Acceder a Tickets</button>
            </form>
        </div>

        <div style="margin-top:15px;">
            <a href="login-tecnico.html">Acceso Técnico</a> |
            <a href="login-admin.html">Acceso Administrador</a>
        </div>
    </div>
</body>
</html>
